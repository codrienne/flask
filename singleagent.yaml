# This Cloud Build file deploys multiple AI agents to work on your codebase sequentially.
# Each agent checks out a fresh branch to analyze a specific subdirectory
# and proposes changes in a separate pull request.

steps:
  # --- Step 1: Configure Git for all subsequent steps ---
  - id: 'ConfigureGit'
    name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -ex
        git config --global user.email "cloud-build-bot@google.com"
        git config --global user.name "Cloud Build Bot"
        echo "✅ Git configured globally."


  - id: 'TestWriterAgent'
    name: 'gcr.io/$PROJECT_ID/gemini-cli-node20:latest'
    secretEnv: ['GEMINI_API_KEY', 'GITHUB_PAT']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -ex
        # Configure GitHub CLI
        echo "$$GITHUB_PAT" | gh auth login --with-token --hostname github.com
        gh config set git_protocol https
  
        # Agent-specific variables
        AGENT_NAME="TestWriterAgent"
        BRANCH_NAME="$${AGENT_NAME}-${BUILD_ID}"
        SUMMARY_FILE="$${AGENT_NAME}-changes.md"
        COMMIT_MSG="[gcb-gem] #testwriter: Add automated Python tests from $${AGENT_NAME} for ${_DIRECTORY}"
  
        # Create a fresh branch from the original commit
        git checkout "$COMMIT_SHA"
        git checkout -b "$${BRANCH_NAME}"
  
        # Run the AI agent
        gemini --debug --prompt "You are an autonomous senior software engineer specializing in Python testing. Your working directory is the project root.
        Your plan is:
        1. Explore the Python files in the '${_DIRECTORY}' subdirectory.
        2. Identify code that lacks adequate unit test coverage.
        3. Write new, high-quality unit tests using the 'pytest' framework.
        4. Run the new tests to ensure they pass.
        5. Create a new file named '$${SUMMARY_FILE}' to summarize the new tests you have added.
  
        IMPORTANT:
        - Only add new tests; **do not modify the existing source code.**
        - Only commit tests that pass successfully.
        - Once the summary file is created, your task is complete. Do not perform any other actions." \
              --model=${_MODEL} \
              --approval-mode=yolo
  
        # Install dependencies and run tests
        pip install -e .[test]
        pytest "${_DIRECTORY}"
  
        # Check for new test files and create a PR if needed
        if [[ -n "$(git status --porcelain)" ]]; then
          SUMMARY_BODY="Automated changes by $${AGENT_NAME}."
          if [[ -f "$${SUMMARY_FILE}" ]]; then
              SUMMARY_BODY=$(cat "$${SUMMARY_FILE}")
          fi
          git add .
          git reset HEAD "$${SUMMARY_FILE}" # Unstage the summary file
          git commit -m "$${COMMIT_MSG}"
          git push https://$$GITHUB_PAT@github.com/${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}.git "$${BRANCH_NAME}"
  
          # Create the Pull Request
          gh pr create \
            --repo "${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}" \
            --base "{$_BASE_BRANCH}" \
            --head "$${BRANCH_NAME}" \
            --title "$${COMMIT_MSG}" \
            --body "$${SUMMARY_BODY}"
        else
          echo "$${AGENT_NAME} did not add any new tests in ${_DIRECTORY}."
        fi

  - id: 'BugHunterAgent'
    name: 'gcr.io/$PROJECT_ID/gemini-cli-node20:latest'
    secretEnv: ['GEMINI_API_KEY', 'GITHUB_PAT']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -ex
        # Configure GitHub CLI
        echo "$$GITHUB_PAT" | gh auth login --with-token --hostname github.com
        gh config set git_protocol https

        # Agent-specific variables
        AGENT_NAME="BugHunterAgent"
        BRANCH_NAME="$${AGENT_NAME}-${SHORT_SHA}"
        SUMMARY_FILE="$${AGENT_NAME}-changes.md"
        COMMIT_MSG="[gcb-gem] #bugfix: Automated bug fixes from $${AGENT_NAME} in ${_DIRECTORY}"

        # Create a fresh branch from the original commit
        git checkout "$COMMIT_SHA"
        git checkout -b "$${BRANCH_NAME}"

        # Run the AI agent
        gemini --debug --prompt "You are an autonomous bug-fixing agent in the /workspace directory.
        Your task is to find and fix bugs (e.g., race conditions, null pointers) in the '${_DIRECTORY}' subdirectory.

        Instructions:
        1. Do not ask for permission; act immediately.
        2. All file paths must be relative; do not use '..'.
        3. Start by running 'ls -R ${_DIRECTORY}' to explore the files.
        4. If you make a change to a file, try and update any corresponding tests.
        5. If you fix any bugs, summarize your changes in a new file named '$${SUMMARY_FILE}'. If no changes are made, do not create this file." \
              --model=${_MODEL} \
              --approval-mode=yolo

        # Check for changes and create a PR if needed
        if [[ -n "$(git status --porcelain)" ]]; then
          SUMMARY_BODY="Automated changes by $${AGENT_NAME}."
          if [[ -f "$${SUMMARY_FILE}" ]]; then
              SUMMARY_BODY=$(cat "$${SUMMARY_FILE}")
          fi
          git add .
          git reset HEAD "$${SUMMARY_FILE}" # Unstage the summary file
          git commit -m "$${COMMIT_MSG}"
          git push https://$$GITHUB_PAT@github.com/${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}.git "$${BRANCH_NAME}"

          # Create the Pull Request
          gh pr create \
            --repo "${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}" \
            --base "${_BASE_BRANCH}" \
            --head "$${BRANCH_NAME}" \
            --title "$${COMMIT_MSG}" \
            --body "$${SUMMARY_BODY}"
        else
          echo "$${AGENT_NAME} found no issues to fix in ${_DIRECTORY}."
        fi

  - id: 'DocWriterAgent'
    name: 'gcr.io/$PROJECT_ID/gemini-cli-node20:latest'
    secretEnv: ['GEMINI_API_KEY', 'GITHUB_PAT']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -ex
        # Configure GitHub CLI
        echo "$$GITHUB_PAT" | gh auth login --with-token --hostname github.com
        gh config set git_protocol https

        # Agent-specific variables
        AGENT_NAME="DocWriterAgent"
        BRANCH_NAME="$${AGENT_NAME}-${SHORT_SHA}"
        SUMMARY_FILE="$${AGENT_NAME}-changes.md"
        COMMIT_MSG="[gcb-gem] #docs: Automated documentation updates from $${AGENT_NAME} in ${_DIRECTORY}"

        # Create a fresh branch from the original commit
        git checkout "$COMMIT_SHA"
        git checkout -b "$${BRANCH_NAME}"

        # Run the AI agent
        gemini --debug --prompt "You are an autonomous technical writer agent. Your working directory is the project root.
        Your plan is:
        1. Explore the files in the '${_DIRECTORY}' subdirectory.
        2. Find the 'README.md' file. If it doesn't exist, create it.
        3. Update the 'README.md' to be high-quality, explaining the code's purpose with clear usage examples.
        4. Create a new file named '$${SUMMARY_FILE}' that briefly summarizes the documentation changes you made.
        
        IMPORTANT: Once you have created the summary file, your task is finished. **Do not delete or revert any files.** Your final output should be a single sentence confirming the task is complete, and nothing more." \
              --model=${_MODEL} \
              --approval-mode=yolo

        # Check for changes and create a PR if needed
        if [[ -n "$(git status --porcelain)" ]]; then
          SUMMARY_BODY="Automated changes by $${AGENT_NAME}."
          if [[ -f "$${SUMMARY_FILE}" ]]; then
              SUMMARY_BODY=$(cat "$${SUMMARY_FILE}")
          fi
          git add .
          git reset HEAD "$${SUMMARY_FILE}" # Unstage the summary file
          git commit -m "$${COMMIT_MSG}"
          git push https://$$GITHUB_PAT@github.com/${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}.git "$${BRANCH_NAME}"

          # Create the Pull Request
          gh pr create \
            --repo "${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}" \
            --base "${_BASE_BRANCH}" \
            --head "$${BRANCH_NAME}" \
            --title "$${COMMIT_MSG}" \
            --body "$${SUMMARY_BODY}"
        else
          echo "$${AGENT_NAME} found no documentation to update in ${_DIRECTORY}."
        fi

  - id: 'CodeQualityAgent'
    name: 'gcr.io/$PROJECT_ID/gemini-cli-node20:latest'
    secretEnv: ['GEMINI_API_KEY', 'GITHUB_PAT']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -ex
        # Configure GitHub CLI
        echo "$$GITHUB_PAT" | gh auth login --with-token --hostname github.com
        gh config set git_protocol https

        # Agent-specific variables
        AGENT_NAME="CodeQualityAgent"
        BRANCH_NAME="$${AGENT_NAME}-${SHORT_SHA}"
        SUMMARY_FILE="$${AGENT_NAME}-changes.md"
        COMMIT_MSG="[gcb-gem] #codequality: Apply automated code quality improvements in ${_DIRECTORY}"

        # Create a fresh branch from the original commit
        git checkout "$COMMIT_SHA"
        git checkout -b "$${BRANCH_NAME}"

        # Run the AI agent
        gemini --debug --prompt "You are an autonomous Go engineering agent in the /workspace directory.
        Your task is to improve code quality in the '${_DIRECTORY}' subdirectory.

        Instructions:
        1. Do not ask for permission; act immediately.
        2. All file paths must be relative; do not use '..'.
        3. Start with 'ls -R ${_DIRECTORY}' to explore files.
        4. Apply these improvements:
            - Refactor for elegance and maintainability.
            - Enforce the Google Python Style Guide in https://google.github.io/styleguide/pyguide.html
            - Modernize deprecated Python packages/APIs 
        5. If you make improvements, summarize your changes in '$${SUMMARY_FILE}'. If no changes are made, do not create this file." \
              --model=${_MODEL} \
              --approval-mode=yolo

        # Check for changes and create a PR if needed
        if [[ -n "$(git status --porcelain)" ]]; then
          SUMMARY_BODY="Automated changes by $${AGENT_NAME}."
          if [[ -f "$${SUMMARY_FILE}" ]]; then
              SUMMARY_BODY=$(cat "$${SUMMARY_FILE}")
          fi
          git add .
          git reset HEAD "$${SUMMARY_FILE}" # Unstage the summary file
          git commit -m "$${COMMIT_MSG}"
          git push https://$$GITHUB_PAT@github.com/${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}.git "$${BRANCH_NAME}"

          # Create the Pull Request
          gh pr create \
            --repo "${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}" \
            --base "${_BASE_BRANCH}" \
            --head "$${BRANCH_NAME}" \
            --title "$${COMMIT_MSG}" \
            --body "$${SUMMARY_BODY}"
        else
          echo "$${AGENT_NAME} found no improvements to make in ${_DIRECTORY}."
        fi

  - id: 'SecurityAgent'
    name: 'gcr.io/$PROJECT_ID/gemini-cli-node20:latest'
    secretEnv: ['GEMINI_API_KEY', 'GITHUB_PAT']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -ex
        # Configure GitHub CLI
        echo "$$GITHUB_PAT" | gh auth login --with-token --hostname github.com
        gh config set git_protocol https

        # Agent-specific variables
        AGENT_NAME="SecurityAgent"
        BRANCH_NAME="$${AGENT_NAME}-${SHORT_SHA}"
        SUMMARY_FILE="$${AGENT_NAME}-changes.md"
        COMMIT_MSG="[gcb-gem] #security: Automated security fixes from $${AGENT_NAME} in ${_DIRECTORY}"

        # Create a fresh branch from the original commit
        git checkout "$COMMIT_SHA"
        git checkout -b "$${BRANCH_NAME}"

        # Run the AI agent
        gemini --debug --prompt "You are an autonomous security agent in the /workspace directory.
        Your task is to find and fix vulnerabilities in the '${_DIRECTORY}' subdirectory.

        Instructions:
        1. Do not ask for permission; act immediately.
        2. All file paths must be relative; do not use '..'.
        3. Start with 'ls -R ${_DIRECTORY}' to explore files.
        4. Find and fix vulnerabilities (e.g., hardcoded secrets, SQL injection, XSS).
        5. Replace hardcoded credentials with the placeholder 'REPLACE_WITH_SECRET_MANAGER_KEY'.
        6. If you fix any vulnerabilities, summarize your changes in '$${SUMMARY_FILE}'. If no changes are made, do not create this file." \
              --model=${_MODEL} \
              --approval-mode=yolo

        # Check for changes and create a PR if needed
        if [[ -n "$(git status --porcelain)" ]]; then
          SUMMARY_BODY="Automated changes by $${AGENT_NAME}."
          if [[ -f "$${SUMMARY_FILE}" ]]; then
              SUMMARY_BODY=$(cat "$${SUMMARY_FILE}")
          fi
          git add .
          git reset HEAD "$${SUMMARY_FILE}" # Unstage the summary file
          git commit -m "$${COMMIT_MSG}"
          git push https://$$GITHUB_PAT@github.com/${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}.git "$${BRANCH_NAME}"

          # Create the Pull Request
          gh pr create \
            --repo "${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}" \
            --base "${_BASE_BRANCH}" \
            --head "$${BRANCH_NAME}" \
            --title "$${COMMIT_MSG}" \
            --body "$${SUMMARY_BODY}"
        else
          echo "$${AGENT_NAME} found no security issues in ${_DIRECTORY}."
        fi

# --- Configuration ---
options:
  diskSizeGb: '300'
#   machineType: 'E2_HIGHCPU_32'

# Secrets to make available as environment variables for all steps.
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/$_SECRET_NAME_GEMINI/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/$_SECRET_NAME_GITHUB/versions/latest
      env: 'GITHUB_PAT'

# User-defined substitutions to pass variables into the build.
substitutions:
  # Pick model from https://ai.google.dev/gemini-api/docs/models
  _MODEL: 'gemini-2.5-flash' #'gemini-1.5-pro-latest' # alternatives: gemini-2.5-pro, gemini-2.5-flash
  _SECRET_NAME_GEMINI: 'ed-gemini-argo-local-edrienne-key'
  _SECRET_NAME_GITHUB: 'ed-flask-github-pat'
  _GITHUB_REPO_OWNER: 'codrienne'
  _GITHUB_REPO_NAME: 'flask'
  _BASE_BRANCH: 'ed-multiagent'
  _DIRECTORY: 'src/flask' # The directory for the agents to focus on.
