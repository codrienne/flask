# This Cloud Build file deploys multiple AI agents to work on your codebase sequentially.
# Each agent checks out a fresh branch to analyze a specific subdirectory
# and proposes changes in a separate pull request.

steps:
# --- Step 1: Configure Git for all subsequent steps ---
- id: 'ConfigureGit'
  name: 'gcr.io/cloud-builders/git'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -ex
    git config --global user.email "cloud-build-bot@google.com"
    git config --global user.name "Cloud Build Bot"
    echo "✅ Git configured globally."

- id: 'BugHunterAgent'
  name: 'gcr.io/$PROJECT_ID/gemini-cli-node20:latest'
  secretEnv: ['GEMINI_API_KEY', 'GITHUB_PAT']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -ex
    # Configure GitHub CLI
    echo "$$GITHUB_PAT" | gh auth login --with-token --hostname github.com
    gh config set git_protocol https

    # Agent-specific variables
    AGENT_NAME="BugHunterAgent"
    BRANCH_NAME="$${AGENT_NAME}-${SHORT_SHA}"
    SUMMARY_FILE="$${AGENT_NAME}-changes.md"
    COMMIT_MSG="fix(ai): Automated bug fixes from $${AGENT_NAME} in ${_DIRECTORY}"

    # Create a fresh branch from the original commit
    git checkout "$COMMIT_SHA"
    git checkout -b "$${BRANCH_NAME}"

    # Run the AI agent
    gemini --debug --prompt "You are an autonomous bug-fixing agent in the /workspace directory.
Your task is to find and fix bugs (e.g., race conditions, null pointers) in the '${_DIRECTORY}' subdirectory.

Instructions:
1. Do not ask for permission; act immediately.
2. All file paths must be relative; do not use '..'.
3. Start by running 'ls -R ${_DIRECTORY}' to explore the files.
4. If you make a change to a file, try and update any corresponding tests.
5. If you fix any bugs, summarize your changes in a new file named '$${SUMMARY_FILE}'. If no changes are made, do not create this file." \
      --model=${_MODEL} \
      --approval-mode=yolo

    # Check for changes and create a PR if needed
    if [[ -n "$(git status --porcelain)" ]]; then
      SUMMARY_BODY="Automated changes by $${AGENT_NAME}."
      if [[ -f "$${SUMMARY_FILE}" ]]; then
          SUMMARY_BODY=$(cat "$${SUMMARY_FILE}")
      fi
      git add .
      git reset HEAD "$${SUMMARY_FILE}" # Unstage the summary file
      git commit -m "$${COMMIT_MSG}"
      git push https://$$GITHUB_PAT@github.com/${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}.git "$${BRANCH_NAME}"

      # Create the Pull Request
      gh pr create \
        --repo "${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}" \
        --base "ed-multiagent" \
        --head "$${BRANCH_NAME}" \
        --title "$${COMMIT_MSG}" \
        --body "$${SUMMARY_BODY}"
    else
      echo "$${AGENT_NAME} found no issues to fix in ${_DIRECTORY}."
    fi

- id: 'DocWriterAgent'
  name: 'gcr.io/$PROJECT_ID/gemini-cli-node20:latest'
  secretEnv: ['GEMINI_API_KEY', 'GITHUB_PAT']
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -ex
    # Configure GitHub CLI
    echo "$$GITHUB_PAT" | gh auth login --with-token --hostname github.com
    gh config set git_protocol https

    # Agent-specific variables
    AGENT_NAME="DocWriterAgent"
    BRANCH_NAME="$${AGENT_NAME}-${SHORT_SHA}"
    SUMMARY_FILE="$${AGENT_NAME}-changes.md"
    COMMIT_MSG="docs(ai): Automated documentation updates from $${AGENT_NAME} in ${_DIRECTORY}"

    # Create a fresh branch from the original commit
    git checkout "$COMMIT_SHA"
    git checkout -b "$${BRANCH_NAME}"

    # Run the AI agent
    gemini --debug --prompt "You are an autonomous technical writer agent in the /workspace directory.
Your task is to improve documentation in the '${_DIRECTORY}' subdirectory.

Instructions:
1. Do not ask for permission; act immediately.
2. All file paths must be relative; do not use '..'.
3. Start with 'ls -R ${_DIRECTORY}' to find files.
4. Locate 'README.md'. If it exists, update it with purpose and examples. If not, create it.
5. If you modify any documentation, summarize your changes in '$${SUMMARY_FILE}'. If no changes are made, do not create this file." \
      --model=${_MODEL} \
      --approval-mode=yolo

    # Check for changes and create a PR if needed
    if [[ -n "$(git status --porcelain)" ]]; then
      SUMMARY_BODY="Automated changes by $${AGENT_NAME}."
      if [[ -f "$${SUMMARY_FILE}" ]]; then
          SUMMARY_BODY=$(cat "$${SUMMARY_FILE}")
      fi
      git add .
      git reset HEAD "$${SUMMARY_FILE}" # Unstage the summary file
      git commit -m "$${COMMIT_MSG}"
      git push https://$$GITHUB_PAT@github.com/${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}.git "$${BRANCH_NAME}"

      # Create the Pull Request
      gh pr create \
        --repo "${_GITHUB_REPO_OWNER}/${_GITHUB_REPO_NAME}" \
        --base "ed-multiagent" \
        --head "$${BRANCH_NAME}" \
        --title "$${COMMIT_MSG}" \
        --body "$${SUMMARY_BODY}"
    else
      echo "$${AGENT_NAME} found no documentation to update in ${_DIRECTORY}."
    fi

